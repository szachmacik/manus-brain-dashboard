name: Deploy to Coolify

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify Deploy
        run: |
          echo "Deploying manus-brain-dashboard → Coolify uuid=kssk4o48sgosgwwck8s8ws80"
          curl -s -f -X POST \
            "https://coolify.ofshore.dev/api/v1/deploy?uuid=kssk4o48sgosgwwck8s8ws80&force=false" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            && echo "✅ Deploy triggered" || echo "⚠️ Deploy trigger failed (non-critical)"
